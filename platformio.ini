; PlatformIO Project Configuration File
;
; Please visit documentation for options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno_r4_minima

[env]
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_eol = LF
monitor_echo = yes

[common]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    waspinator/AccelStepper@^1.64
    powerbroker2/ArduPID@^0.2.1
build_flags =
    -D STEPS_PER_MM_X=200.0  ; Steps per mm for X axis (customizable per CNC)
    -D STEPS_PER_MM_Y=200.0  ; Steps per mm for Y axis (customizable per CNC)
    -D STEPS_PER_MM_Z=50.0  ; Steps per mm for Z axis (for anti-dive lift)
    -D ANTI_DIVE_BONUS_MM=1.5  ; Bonus lift in mm during anti-dive (moved from code)
    -D DEFAULT_VOLTAGEDIVIDER=83.27  ; Voltage divider factor (moved from code)

[env:uno_r4_minima]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=0  ; Metric units

[env:uno_r4_minima_imperial]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=1  ; Imperial units

[env:uno_r4_minima_RPi]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
platform_packages =
    toolchain-gccarmnoneeabi@file:///opt/gcc-arm-none-eabi
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=0  ; Metric units

[env:uno_r4_minima_RPi_imperial]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
platform_packages =
    toolchain-gccarmnoneeabi@file:///opt/gcc-arm-none-eabi
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=1  ; Imperial units