; PlatformIO Project Configuration File
;
; Please visit documentation for options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uno_r4_minima

[env]
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_eol = LF
monitor_echo = yes

[common]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
lib_deps =
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    waspinator/AccelStepper@^1.64
    powerbroker2/ArduPID@^0.2.1
build_flags =
    -D STEPS_PER_MM_X=200.0  ; Steps per mm for X axis (customizable per CNC)
    -D STEPS_PER_MM_Y=200.0  ; Steps per mm for Y axis (customizable per CNC)
    -D STEPS_PER_MM_Z=50.0  ; Steps per mm for Z axis (used for anti-dive lift calc)
    -D ANTI_DIVE_LIFT_MM=3.0  ; Emergency Z retract height (mm) when anti-dive triggers
    -D Z_DIR_INVERT=0  ; 1 = flip Z direction (set this if torch dives instead of lifts on bench test)
    -D DEFAULT_VOLTAGEDIVIDER=50.0  ; Voltage divider factor (moved from code)
    -D ARC_OK_PIN=0  ; 1 = use physical ARC_OK pin, 0 = derive arc OK from plasma voltage (>50 V)
    ;

    ; ========================================================================
    ; !!! DANGER ZONE — STEPPER + CUT SPEED OVERRIDES !!!
    ; ------------------------------------------------------------------------
    ; The three options below let you change the Z stepper motion envelope
    ; and the max XY cut speed cap. They look harmless. They are NOT.
    ;
    ; STEPPER_MAX_SPEED and STEPPER_ACCELERATION are TIGHTLY COUPLED to the
    ; PID gains (KP / KI / KD). The defaults (5000 / 5000) were tuned together
    ; with those gains and are deliberately HIGHER than what you would use
    ; for a normal Z jog/home — the THC must out-run regular motion to chase
    ; voltage transients.
    ;
    ; If you uncomment ANY override below, you accept that:
    ;   1. Your existing PID tuning is invalidated.
    ;   2. You will re-tune Kp / Ki / Kd from scratch on the new envelope.
    ;   3. Lowering these values WITHOUT retuning => PID saturates, the loop
    ;      lags, the torch dives or chatters.
    ;
    ; Defaults assume a NEMA17 1.8°/step, ~400 pulses/rev (1/8 µstep), 8 mm
    ; leadscrew (= 50 steps/mm on Z). If that matches your hardware, leave
    ; this section commented out. There is no other reason to touch it.
    ;
    ; MAX_CUT_SPEED is unit-aware — set a value matching USE_IMPERIAL
    ; (mm/min in metric builds, IPM in imperial builds).
    ; ========================================================================
    ;
    ; -D STEPPER_MAX_SPEED=5000.0f      ; Z stepper max speed (steps/s) — RETUNE PID IF CHANGED
    ; -D STEPPER_ACCELERATION=5000.0f   ; Z stepper accel (steps/s²)    — RETUNE PID IF CHANGED
    ; -D MAX_CUT_SPEED=10000.0f         ; XY cut speed cap (mm/min or IPM, match USE_IMPERIAL)

[env:uno_r4_minima]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=0  ; Metric units

[env:uno_r4_minima_imperial]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=1  ; Imperial units

[env:uno_r4_minima_RPi]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
platform_packages =
    toolchain-gccarmnoneeabi@file:///opt/gcc-arm-none-eabi
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=0  ; Metric units

[env:uno_r4_minima_RPi_imperial]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_deps = ${common.lib_deps}
platform_packages =
    toolchain-gccarmnoneeabi@file:///opt/gcc-arm-none-eabi
build_flags =
    ${common.build_flags}
    -D USE_IMPERIAL=1  ; Imperial units